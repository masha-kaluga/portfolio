<!DOCTYPE html>
<html>
<head>
    <title>Тест по HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Тест по HTML</h1>
        
        <div id="test-area">
            <div class="question" id="question-text"></div>
            <div id="options-container"></div>
            <button id="check-btn" class="btn">Проверить</button>
            <button id="next-btn" class="btn btn-next" style="display: none;">Следующий вопрос</button>
            <div id="feedback" class="feedback"></div>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
